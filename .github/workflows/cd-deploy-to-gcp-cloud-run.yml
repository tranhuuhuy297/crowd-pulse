name: CD — Deploy to GCP Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGION: us-central1
  REPO: crowdpulse
  SERVICE: crowdpulse

jobs:
  deploy:
    name: Build & deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 3600 \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --set-secrets REDIS_URL=REDIS_URL:latest \
            --set-secrets TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest \
            --set-secrets REDDIT_CLIENT_ID=REDDIT_CLIENT_ID:latest \
            --set-secrets REDDIT_CLIENT_SECRET=REDDIT_CLIENT_SECRET:latest \
            --set-secrets REDDIT_USERNAME=REDDIT_USERNAME:latest \
            --set-secrets REDDIT_PASSWORD=REDDIT_PASSWORD:latest \
            --set-env-vars NODE_ENV=production,API_PORT=4177

      - name: Show deployed service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'
